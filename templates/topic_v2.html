<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智能分析与切片 · AutoSlice</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="{{ url_for('static', filename='workbench.css') }}">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/" aria-label="AutoSlice 首页">
        <span class="brand-mark" aria-hidden="true">AS</span>
        <span class="brand-copy"><strong>AutoSlice</strong><span>直播切片工作台</span></span>
    </a>
    <nav class="topnav" aria-label="主要功能">
        <a href="/" class="active" aria-current="page">智能分析</a>
        <a href="/direct-slice">高级重切</a>
        <a href="/subtitle-workflow">字幕校对</a>
        <a href="/autocover" target="_blank" rel="noopener">自动封面</a>
    </nav>
</header>

<main class="page-shell">
    <div class="page-heading">
        <div>
            <h1>智能分析与切片</h1>
            <p>生成逐话题报告，并从高能候选中保留完整上下文。</p>
        </div>
        <div class="workflow-trail">选择录播　→　配置分析　→　生成结果</div>
    </div>

    <div id="pageNotice" class="notice" role="status" aria-live="polite">正在扫描录播目录...</div>

    <div class="workspace-grid">
        <section class="panel" aria-labelledby="workflowTitle">
            <div class="panel-header">
                <h2 id="workflowTitle">新建分析任务</h2>
                <span class="meta" id="selectionState">未选择录播</span>
            </div>

            <div class="step-block">
                <div class="step-heading">
                    <span class="step-index">1</span>
                    <strong>工作目录</strong>
                    <span>自动记住本机设置</span>
                </div>
                <div class="field-row">
                    <label for="videoDir">录播目录</label>
                    <div class="field-control">
                        <input type="text" id="videoDir" autocomplete="off">
                        <button class="button" id="scanButton" type="button" onclick="scan()">扫描录播</button>
                    </div>
                </div>
                <div class="field-row">
                    <label for="outputDir">输出目录</label>
                    <input type="text" id="outputDir" autocomplete="off">
                </div>
            </div>

            <div class="step-block">
                <div class="step-heading">
                    <span class="step-index">2</span>
                    <strong>选择录播</strong>
                    <span id="videoCount">0 个可用文件</span>
                </div>
                <div class="video-list" id="vlist" aria-label="录播列表">
                    <div class="empty-state">正在读取目录...</div>
                </div>
                <div class="selected-summary" id="selectedSummary" hidden>
                    <span class="summary-label">当前录播</span>
                    <span class="summary-title" id="selectedName"></span>
                    <span class="summary-path" id="selectedPath"></span>
                </div>
            </div>

            <div class="step-block">
                <div class="step-heading">
                    <span class="step-index">3</span>
                    <strong>分析设置</strong>
                    <span>默认设置适合日常任务</span>
                </div>
                <div class="field-row">
                    <label for="streamerProfile">主播配置</label>
                    <select id="streamerProfile" onchange="onStreamerProfileChange()">
                        <option value="auto">自动识别</option>
                    </select>
                </div>
                <div class="field-row">
                    <label for="timelineMode">辅助时间轴</label>
                    <div class="field-control">
                        <select id="timelineMode" onchange="toggleTimelineMode()">
                            <option value="none" selected>不使用时间轴</option>
                            <option value="manual">手动选择 DOCX</option>
                            <option value="auto">自动匹配日期 DOCX</option>
                        </select>
                        <button class="button small" id="refreshTimelineButton" type="button" onclick="loadTimelines()">刷新列表</button>
                    </div>
                </div>
                <div class="field-row" id="timelineManualRow" hidden>
                    <label for="timelineSelect">时间轴文件</label>
                    <div class="field-control">
                        <select id="timelineSelect" onchange="onTimelineSelection(this.value)">
                            <option value="">选择 DOCX</option>
                        </select>
                        <input type="text" id="timelinePath" oninput="clearOptimizedTimeline();updateActions()" placeholder="也可粘贴人工时间轴 DOCX 路径">
                    </div>
                </div>
                <div id="timelineArtifact" class="artifact-path" hidden></div>
            </div>

            <div class="action-bar">
                <details class="more-actions" id="moreActions">
                    <summary class="button">更多操作</summary>
                    <div class="more-menu">
                        <button class="button quiet" id="optimizeButton" type="button" onclick="optimizeTimeline()" disabled>仅优化时间轴</button>
                        <button class="button quiet" id="retryButton" type="button" onclick="retryClipReview()" disabled>仅重新复核候选</button>
                    </div>
                </details>
                <button class="button primary" id="startButton" type="button" onclick="startPipeline()" disabled>开始分析+切片</button>
            </div>
        </section>

        <section class="panel activity-panel" aria-labelledby="activityTitle">
            <div class="panel-header">
                <h2 id="activityTitle">任务与结果</h2>
                <span class="meta" id="activityState">等待启动</span>
            </div>
            <div class="activity-scroll">
                <div class="progress-list" id="progressBox">
                    <div class="empty-state">任务启动后，这里会持续显示分析和切片进度。</div>
                </div>
                <div class="artifact-result" id="resultArtifact" hidden>
                    <div class="artifact-path" id="resultPaths"></div>
                    <button class="button" id="openResultButton" type="button" onclick="openResultDirectory()">打开结果目录</button>
                </div>
                <div class="report" id="report" hidden></div>
            </div>
        </section>
    </div>
</main>

<script>
let selVideo=null,selAss=null,sse=null,optimizedTimeline=null,resultTaskId=null,scanBusy=false,taskBusy=false;
const STREAMER_PROFILE_STORAGE_KEY='autoslice.streamer-profile';
const DEFAULT_VIDEO_DIR={{ default_video_dir|tojson }};
const DEFAULT_OUTPUT_DIR={{ default_output_dir|tojson }};
const VIDEO_DIR_STORAGE_KEY='autoslice.video-dir';
const OUTPUT_DIR_STORAGE_KEY='autoslice.output-dir';

function byId(id){return document.getElementById(id)}
function esc(value){return String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}

function setNotice(message,kind=''){
    const notice=byId('pageNotice');
    notice.textContent=message;
    notice.className=`notice ${kind}`.trim();
}

async function jsonRequest(url,options={}){
    const response=await fetch(url,{headers:{'Content-Type':'application/json'},...options});
    const result=await response.json().catch(()=>({error:`服务返回了无效数据 (${response.status})`}));
    if(!response.ok||result.error)throw new Error(result.error||`请求失败 (${response.status})`);
    return result;
}

function restoreWorkspacePaths(){
    try{
        byId('videoDir').value=localStorage.getItem(VIDEO_DIR_STORAGE_KEY)||DEFAULT_VIDEO_DIR;
        byId('outputDir').value=localStorage.getItem(OUTPUT_DIR_STORAGE_KEY)||DEFAULT_OUTPUT_DIR;
    }catch(error){
        byId('videoDir').value=DEFAULT_VIDEO_DIR;
        byId('outputDir').value=DEFAULT_OUTPUT_DIR;
    }
}

function rememberWorkspacePaths(){
    try{
        localStorage.setItem(VIDEO_DIR_STORAGE_KEY,byId('videoDir').value);
        localStorage.setItem(OUTPUT_DIR_STORAGE_KEY,byId('outputDir').value);
    }catch(error){}
}

function renderReport(markdown){
    const sliceTag='<span class="slice-tag">已切片</span>';
    return String(markdown||'').split(/\r?\n/).map(raw=>{
        const line=esc(raw).replace(/✂️/g,sliceTag);
        if(raw.startsWith('# '))return `<h1>${line.slice(2)}</h1>`;
        if(raw.startsWith('## '))return `<h2>${line.slice(3)}</h2>`;
        return line?`<div>${line}</div>`:'<br>';
    }).join('');
}

function updateActions(){
    const manualReady=byId('timelineMode').value==='manual'&&Boolean(byId('timelinePath').value.trim());
    byId('startButton').disabled=!selVideo||taskBusy;
    byId('retryButton').disabled=!selVideo||taskBusy;
    byId('optimizeButton').disabled=!selVideo||!manualReady||taskBusy;
    byId('scanButton').disabled=scanBusy||taskBusy;
}

function clearResultArtifact(){
    resultTaskId=null;
    byId('resultArtifact').hidden=true;
    byId('resultPaths').textContent='';
}

function renderResultArtifact(taskId,result){
    if(!result||!result.artifact_dir){clearResultArtifact();return}
    resultTaskId=taskId;
    const lines=[`整理包：${result.artifact_dir}`];
    if(result.overview_path)lines.push(`优先查看：${result.overview_path}`);
    if(result.slice_dir)lines.push(`实际切片：${result.slice_dir}`);
    byId('resultPaths').textContent=lines.join('\n');
    byId('resultPaths').title=lines.join('\n');
    byId('resultArtifact').hidden=false;
}

async function openResultDirectory(){
    if(!resultTaskId){setNotice('当前没有可打开的结果目录','warning');return}
    try{
        await jsonRequest('/api/open-result-directory',{method:'POST',body:JSON.stringify({task_id:resultTaskId})});
        setNotice('已在资源管理器中打开结果目录','success');
    }catch(error){setNotice(`结果目录打开失败：${error.message}`,'error')}
}

function taskTypeLabel(taskId){
    if(taskId?.startsWith('timeline_opt_'))return '人工时间轴优化';
    if(taskId?.startsWith('clip_review_'))return '候选片段复核';
    return '智能分析与切片';
}

function renderTaskProgress(data){
    const percent=data.total>0?Math.max(0,Math.min(100,Math.round(data.step/data.total*100))):0;
    const status=data.status==='done'?'done':data.status==='error'?'error':'running';
    const statusText=status==='done'?'完成':status==='error'?'失败':'进行中';
    byId('progressBox').innerHTML=`
        <div class="progress-item ${status}">
            <div class="progress-heading">
                <span class="progress-name" title="${esc(data.task_id)}">${esc(taskTypeLabel(data.task_id))}</span>
                <span class="status-chip ${status}">${statusText}</span>
            </div>
            ${status==='running'?`<div class="progress-track"><div class="progress-fill" style="transform:scaleX(${percent/100})"></div></div>`:''}
            <div class="progress-message">${esc(data.progress||'等待任务状态...')}</div>
        </div>`;
    byId('activityState').textContent=status==='running'?`${percent}% · 正在处理`:statusText;
    taskBusy=status==='running';
    updateActions();
}

function connectSSE(){
    if(sse)sse.close();
    sse=new EventSource('/api/events');
    sse.addEventListener('task_update',event=>{
        const data=JSON.parse(event.data);
        const relevant=data.task_id&&(data.task_id.startsWith('pipeline_')||data.task_id.startsWith('timeline_opt_')||data.task_id.startsWith('clip_review_'));
        if(!relevant)return;
        renderTaskProgress(data);
        if(data.status==='error')setNotice(data.progress||'任务执行失败','error');
        if(data.status==='done'&&data.result){
            try{
                const result=JSON.parse(data.result);
                if(data.task_id.startsWith('timeline_opt_')){
                    optimizedTimeline={videoPath:result.video_path,sourcePath:(result.manual_timeline||{}).path,jsonPath:result.optimized_json_path,mdPath:result.optimized_md_path,profileId:result.streamer_profile_id};
                    renderOptimizedTimeline();
                }else{
                    const report=byId('report');
                    report.hidden=!result.report;
                    report.innerHTML=renderReport(result.report||'');
                }
                renderResultArtifact(data.task_id,result);
                setNotice(`${taskTypeLabel(data.task_id)}已完成`,'success');
            }catch(error){setNotice('任务完成，但结果数据无法读取','error')}
        }
    });
    sse.onerror=()=>{byId('activityState').textContent='连接恢复中';setTimeout(connectSSE,3000)};
}

function renderVideoList(videos){
    const list=byId('vlist');
    list.replaceChildren();
    videos.forEach(video=>{
        const item=document.createElement('button');
        item.type='button';
        item.className='video-item';
        item.title=video.path;
        item.addEventListener('click',()=>pick(item,video));
        const name=document.createElement('span');
        name.className='video-name';
        name.textContent=video.name;
        const ass=document.createElement('span');
        ass.className=`badge ${video.has_ass?'info':''}`;
        ass.textContent=video.has_ass?'有弹幕':'无弹幕';
        const srt=document.createElement('span');
        srt.className=`badge ${video.has_srt?'success':''}`;
        srt.textContent=video.has_srt?'有字幕':'无字幕';
        item.append(name,ass,srt);
        list.appendChild(item);
    });
    if(!videos.length)list.innerHTML='<div class="empty-state">目录中没有可分析的录播文件。</div>';
}

async function scan(){
    rememberWorkspacePaths();
    scanBusy=true;
    updateActions();
    setNotice('正在扫描录播目录...');
    byId('vlist').innerHTML='<div class="empty-state">正在读取视频、字幕和弹幕文件...</div>';
    try{
        const result=await jsonRequest('/api/scan',{method:'POST',body:JSON.stringify({video_dir:byId('videoDir').value})});
        const videos=result.videos||[];
        renderVideoList(videos);
        byId('videoCount').textContent=`${videos.length} 个可用文件`;
        setNotice(videos.length?`扫描完成，找到 ${videos.length} 个录播文件`:'扫描完成，但目录中没有找到录播','success');
    }catch(error){
        renderVideoList([]);
        byId('videoCount').textContent='0 个可用文件';
        setNotice(`扫描失败：${error.message}`,'error');
    }finally{scanBusy=false;updateActions()}
}

async function loadTimelines(){
    try{
        const result=await jsonRequest('/api/timelines');
        const select=byId('timelineSelect');
        select.replaceChildren(new Option('选择 DOCX',''));
        (result.files||[]).forEach(file=>select.add(new Option(file.name,file.path)));
        if(byId('timelineMode').value==='manual')setNotice(`已载入 ${(result.files||[]).length} 个人工时间轴`,'success');
    }catch(error){setNotice(`时间轴列表加载失败：${error.message}`,'error')}
}

async function loadStreamerProfiles(){
    const select=byId('streamerProfile');
    try{
        const result=await jsonRequest('/api/streamer-profiles');
        const remembered=localStorage.getItem(STREAMER_PROFILE_STORAGE_KEY)||'auto';
        select.replaceChildren();
        (result.profiles||[]).forEach(profile=>select.add(new Option(profile.label,profile.id)));
        select.value=[...select.options].some(option=>option.value===remembered)?remembered:'auto';
    }catch(error){select.replaceChildren(new Option('自动识别','auto'))}
}

function selectedStreamerProfile(){return byId('streamerProfile').value||'auto'}
function onStreamerProfileChange(){try{localStorage.setItem(STREAMER_PROFILE_STORAGE_KEY,selectedStreamerProfile())}catch(error){}clearOptimizedTimeline()}

function toggleTimelineMode(){
    const mode=byId('timelineMode').value;
    byId('timelineManualRow').hidden=mode!=='manual';
    if(mode!=='manual')clearOptimizedTimeline();
    if(mode==='manual')loadTimelines();
    updateActions();
}

function pick(element,video){
    document.querySelectorAll('.video-item').forEach(item=>item.classList.remove('selected'));
    element.classList.add('selected');
    selVideo=video.path;
    selAss=video.has_ass?video.path.replace(/\.flv$/i,'.ass'):'';
    byId('selectedName').textContent=video.name;
    byId('selectedName').title=video.name;
    byId('selectedPath').textContent=video.path;
    byId('selectedPath').title=video.path;
    byId('selectedSummary').hidden=false;
    byId('selectionState').textContent=video.name;
    byId('selectionState').title=video.path;
    clearOptimizedTimeline();
    clearResultArtifact();
    byId('report').hidden=true;
    setNotice(`已选择：${video.name}`,'success');
    updateActions();
}

function onTimelineSelection(path){byId('timelinePath').value=path;clearOptimizedTimeline();updateActions()}
function clearOptimizedTimeline(){optimizedTimeline=null;byId('timelineArtifact').hidden=true;byId('timelineArtifact').textContent=''}
function renderOptimizedTimeline(){
    if(!optimizedTimeline?.jsonPath){clearOptimizedTimeline();return}
    const text=`优化 JSON：${optimizedTimeline.jsonPath}\n审阅文档：${optimizedTimeline.mdPath||'未生成'}`;
    byId('timelineArtifact').textContent=text;
    byId('timelineArtifact').title=text;
    byId('timelineArtifact').hidden=false;
}

async function runAction({url,body,starting,failure}){
    taskBusy=true;
    updateActions();
    byId('progressBox').innerHTML=`<div class="empty-state">${esc(starting)}</div>`;
    byId('activityState').textContent='正在启动';
    setNotice(starting);
    try{
        await jsonRequest(url,{method:'POST',body:JSON.stringify(body)});
        setNotice('任务已启动，可在右侧查看实时进度','success');
    }catch(error){
        taskBusy=false;
        updateActions();
        byId('activityState').textContent='启动失败';
        setNotice(`${failure}：${error.message}`,'error');
    }
}

async function optimizeTimeline(){
    if(!selVideo){setNotice('请先从列表选择录播','warning');return}
    rememberWorkspacePaths();
    const timelinePath=byId('timelinePath').value.trim();
    if(byId('timelineMode').value!=='manual'||!timelinePath){setNotice('仅优化时间轴需要手动选择 DOCX 文件','warning');return}
    clearOptimizedTimeline();clearResultArtifact();
    await runAction({url:'/api/optimize-manual-timeline',starting:'正在启动人工时间轴优化...',failure:'时间轴优化启动失败',body:{flv_path:selVideo,ass_path:selAss,manual_timeline_path:timelinePath,output_dir:document.getElementById('outputDir').value,streamer_profile_id:selectedStreamerProfile()}});
}

async function startPipeline(){
    if(!selVideo){setNotice('请先从列表选择录播','warning');return}
    rememberWorkspacePaths();
    const mode=byId('timelineMode').value;
    const timelinePath=byId('timelinePath').value.trim();
    if(mode==='manual'&&!timelinePath){setNotice('请选择或填写辅助时间轴 DOCX','warning');return}
    const optimizedPath=optimizedTimeline&&optimizedTimeline.videoPath===selVideo&&optimizedTimeline.sourcePath===timelinePath&&optimizedTimeline.profileId===selectedStreamerProfile()?optimizedTimeline.jsonPath:'';
    byId('report').hidden=true;clearResultArtifact();
    await runAction({url:'/api/start-pipeline',starting:'正在启动完整分析与切片...',failure:'完整分析启动失败',body:{flv_path:selVideo,ass_path:selAss,output_dir:document.getElementById('outputDir').value,manual_timeline_mode:mode,manual_timeline_path:timelinePath,optimized_timeline_path:optimizedPath,streamer_profile_id:selectedStreamerProfile()}});
}

async function retryClipReview(){
    if(!selVideo){setNotice('请先从列表选择录播','warning');return}
    rememberWorkspacePaths();
    byId('report').hidden=true;clearResultArtifact();
    await runAction({url:'/api/retry-clip-review',starting:'正在启动候选片段复核...',failure:'候选复核启动失败',body:{flv_path:selVideo,ass_path:selAss,output_dir:document.getElementById('outputDir').value,streamer_profile_id:selectedStreamerProfile()}});
}

restoreWorkspacePaths();
connectSSE();
loadStreamerProfiles();
toggleTimelineMode();
scan();
</script>
</body>
</html>
