<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>高级重新切片 · AutoSlice</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="{{ url_for('static', filename='workbench.css') }}">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/" aria-label="AutoSlice 首页">
        <span class="brand-mark" aria-hidden="true">AS</span>
        <span class="brand-copy"><strong>AutoSlice</strong><span>直播切片工作台</span></span>
    </a>
    <nav class="topnav" aria-label="主要功能">
        <a href="/">智能分析</a>
        <a href="/direct-slice" class="active" aria-current="page">高级重切</a>
        <a href="/subtitle-workflow">字幕校对</a>
        <a href="/autocover" target="_blank" rel="noopener">自动封面</a>
    </nav>
</header>

<main class="page-shell">
    <div class="page-heading">
        <div>
            <h1>高级重新切片</h1>
            <p>复用已有 JSON 标记，或用人工时间轴重新生成视频片段。</p>
        </div>
        <div class="workflow-trail">选择录播　→　指定标记　→　重新切片</div>
    </div>

    <div id="pageNotice" class="notice" role="status" aria-live="polite">正在扫描录播目录...</div>

    <div class="workspace-grid">
        <section class="panel" aria-labelledby="resliceTitle">
            <div class="panel-header">
                <h2 id="resliceTitle">重新切片任务</h2>
                <span class="meta" id="selectionState">未选择录播</span>
            </div>
            <div class="step-block">
                <div class="step-heading"><span class="step-index">1</span><strong>工作目录</strong><span>与智能分析共用</span></div>
                <div class="field-row">
                    <label for="vd">录播目录</label>
                    <div class="field-control"><input type="text" id="vd" autocomplete="off"><button class="button" id="scanButton" type="button" onclick="scan()">扫描录播</button></div>
                </div>
                <div class="field-row"><label for="od">输出目录</label><input type="text" id="od" autocomplete="off"></div>
            </div>
            <div class="step-block">
                <div class="step-heading"><span class="step-index">2</span><strong>选择录播</strong><span id="videoCount">0 个可用文件</span></div>
                <div class="video-list" id="vlist"><div class="empty-state">正在读取目录...</div></div>
                <div class="selected-summary" id="selectedSummary" hidden>
                    <span class="summary-label">当前录播</span><span class="summary-title" id="selectedName"></span><span class="summary-path" id="selectedPath"></span>
                </div>
            </div>
            <div class="step-block">
                <div class="step-heading"><span class="step-index">3</span><strong>切片依据</strong><span id="modeHint">推荐复用分析结果</span></div>
                <div class="field-row">
                    <label for="mode">切片模式</label>
                    <select id="mode" onchange="toggleTimeline()">
                        <option value="timeline-json" selected>JSON 标记重新切片</option>
                        <option value="timeline">人工时间轴 DOCX 重切</option>
                        <option value="danmaku">弹幕密度直切（旧版）</option>
                        <option value="hybrid">时间轴 + 密度（旧版）</option>
                    </select>
                </div>
                <div class="field-row" id="timelineRow">
                    <label for="timelineSelect">标记文件</label>
                    <div class="field-control">
                        <select id="timelineSelect" onchange="onTimelineSelect()"><option value="">选择 JSON</option></select>
                        <label class="file-picker" for="timelineUpload" title="从本机选择文件">
                            <input type="file" id="timelineUpload" accept=".json" onchange="onTimelineUpload()">
                            <span id="uploadLabel">或从本机上传</span>
                        </label>
                        <input type="hidden" id="timelinePath"><input type="hidden" id="timelineJson">
                    </div>
                </div>
            </div>
            <div class="action-bar">
                <button class="button primary" id="sliceButton" type="button" onclick="sliceSelected()" disabled>重新切片选中视频</button>
            </div>
        </section>

        <section class="panel activity-panel" aria-labelledby="tasksTitle">
            <div class="panel-header"><h2 id="tasksTitle">切片任务</h2><span class="meta" id="activityState">等待启动</span></div>
            <div class="activity-scroll"><div class="progress-list" id="tasks"><div class="empty-state">任务启动后，这里会显示实时进度。</div></div></div>
        </section>
    </div>
</main>

<script>
let selectedVideo=null,tasks={},sse=null,scanBusy=false,taskBusy=false;
const DEFAULT_VIDEO_DIR={{ default_video_dir|tojson }},DEFAULT_OUTPUT_DIR={{ default_output_dir|tojson }};
const VIDEO_DIR_STORAGE_KEY='autoslice.video-dir',OUTPUT_DIR_STORAGE_KEY='autoslice.output-dir';
function byId(id){return document.getElementById(id)}
function esc(value){return String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}
function setNotice(message,kind=''){const el=byId('pageNotice');el.textContent=message;el.className=`notice ${kind}`.trim()}
function restoreWorkspacePaths(){try{byId('vd').value=localStorage.getItem(VIDEO_DIR_STORAGE_KEY)||DEFAULT_VIDEO_DIR;byId('od').value=localStorage.getItem(OUTPUT_DIR_STORAGE_KEY)||DEFAULT_OUTPUT_DIR}catch(error){byId('vd').value=DEFAULT_VIDEO_DIR;byId('od').value=DEFAULT_OUTPUT_DIR}}
function rememberWorkspacePaths(){try{localStorage.setItem(VIDEO_DIR_STORAGE_KEY,byId('vd').value);localStorage.setItem(OUTPUT_DIR_STORAGE_KEY,byId('od').value)}catch(error){}}
async function jsonRequest(url,options={}){const response=await fetch(url,{headers:{'Content-Type':'application/json'},...options});const result=await response.json().catch(()=>({error:`服务返回了无效数据 (${response.status})`}));if(!response.ok||result.error)throw new Error(result.error||`请求失败 (${response.status})`);return result}

function modeNeedsTimeline(){return ['timeline-json','timeline','hybrid'].includes(byId('mode').value)}
function updateActions(){byId('sliceButton').disabled=!selectedVideo||taskBusy||(modeNeedsTimeline()&&!byId('timelinePath').value);byId('scanButton').disabled=scanBusy||taskBusy}

function toggleTimeline(){
    const mode=byId('mode').value;
    byId('timelineRow').hidden=!modeNeedsTimeline();
    byId('timelinePath').value='';
    byId('timelineSelect').value='';
    byId('timelineUpload').value='';
    byId('uploadLabel').textContent='或从本机上传';
    const hints={
        'timeline-json':'使用智能分析生成的 clip_marks.json',
        timeline:'按人工 DOCX 时间段重新切片',
        danmaku:'旧版模式，仅按弹幕密度计算',
        hybrid:'旧版模式，组合人工时间轴与密度'
    };
    byId('modeHint').textContent=hints[mode]||'';
    if(mode==='timeline-json')loadJsonTimelines();
    if(mode==='timeline'||mode==='hybrid')loadDocxTimelines();
    updateActions();
}

function connectSSE(){
    if(sse)sse.close();
    sse=new EventSource('/api/events');
    sse.addEventListener('init',event=>{tasks=JSON.parse(event.data);renderTasks()});
    sse.addEventListener('task_update',event=>{const data=JSON.parse(event.data);tasks[data.task_id]=data;renderTasks();if(data.status==='error')setNotice(data.progress||'切片任务失败','error');if(data.status==='done')setNotice('重新切片完成','success')});
    sse.onerror=()=>{byId('activityState').textContent='连接恢复中';setTimeout(connectSSE,3000)};
}

function summarizeTaskResult(result){
    if(!result)return '';
    try{const parsed=typeof result==='string'?JSON.parse(result):result;return parsed.slice_dir?`输出：${parsed.slice_dir}`:parsed.output_dir?`输出：${parsed.output_dir}`:''}catch(error){return String(result).slice(0,180)}
}

function renderTasks(){
    const ids=Object.keys(tasks);
    const list=byId('tasks');
    if(!ids.length){list.innerHTML='<div class="empty-state">任务启动后，这里会显示实时进度。</div>';byId('activityState').textContent='等待启动';return}
    const order={running:0,pending:1,queued:1,done:2,error:3};
    ids.sort((left,right)=>(order[tasks[left].status]??9)-(order[tasks[right].status]??9));
    list.innerHTML=ids.map(id=>{
        const task=tasks[id];
        const percent=task.total>0?Math.max(0,Math.min(100,Math.round(task.step/task.total*100))):0;
        const status=task.status==='done'?'done':task.status==='error'?'error':'running';
        const label=status==='done'?'完成':status==='error'?'失败':'进行中';
        const detail=[task.progress||'',summarizeTaskResult(task.result)].filter(Boolean).join(' · ');
        return `<div class="progress-item ${status}"><div class="progress-heading"><span class="progress-name" title="${esc(id)}">${esc(id)}</span><span class="status-chip ${status}">${label}</span></div>${status==='running'?`<div class="progress-track"><div class="progress-fill" style="transform:scaleX(${percent/100})"></div></div>`:''}<div class="progress-message">${esc(detail)}</div></div>`;
    }).join('');
    const active=ids.map(id=>tasks[id]).find(task=>task.status==='running'||task.status==='pending'||task.status==='queued');
    taskBusy=Boolean(active);
    byId('activityState').textContent=active?'正在切片':`${ids.length} 个任务`;
    updateActions();
}

function renderVideos(videos){
    const list=byId('vlist');list.replaceChildren();
    videos.forEach(video=>{
        const item=document.createElement('button');item.type='button';item.className='video-item';item.title=video.path;
        item.addEventListener('click',()=>pick(item,video));
        const name=document.createElement('span');name.className='video-name';name.textContent=video.name;
        const ass=document.createElement('span');ass.className=`badge ${video.has_ass?'info':''}`;ass.textContent=video.has_ass?'有弹幕':'无弹幕';
        const srt=document.createElement('span');srt.className=`badge ${video.has_srt?'success':''}`;srt.textContent=video.has_srt?'有字幕':'无字幕';
        item.append(name,ass,srt);list.appendChild(item);
    });
    if(!videos.length)list.innerHTML='<div class="empty-state">目录中没有找到录播文件。</div>';
}

async function scan(){
    rememberWorkspacePaths();scanBusy=true;updateActions();setNotice('正在扫描录播目录...');byId('vlist').innerHTML='<div class="empty-state">正在读取文件...</div>';
    try{const result=await jsonRequest('/api/scan',{method:'POST',body:JSON.stringify({video_dir:byId('vd').value})});const videos=result.videos||[];renderVideos(videos);byId('videoCount').textContent=`${videos.length} 个可用文件`;setNotice(videos.length?`扫描完成，找到 ${videos.length} 个录播文件`:'扫描完成，但目录中没有找到录播','success')}catch(error){renderVideos([]);byId('videoCount').textContent='0 个可用文件';setNotice(`扫描失败：${error.message}`,'error')}finally{scanBusy=false;updateActions()}
}

function pick(element,video){document.querySelectorAll('.video-item').forEach(item=>item.classList.remove('selected'));element.classList.add('selected');selectedVideo=video.path;byId('selectedName').textContent=video.name;byId('selectedName').title=video.name;byId('selectedPath').textContent=video.path;byId('selectedPath').title=video.path;byId('selectedSummary').hidden=false;byId('selectionState').textContent=video.name;byId('selectionState').title=video.path;setNotice(`已选择：${video.name}`,'success');updateActions()}

async function sliceSelected(){
    if(!selectedVideo){setNotice('请先从列表选择录播','warning');return}
    const mode=byId('mode').value;
    if(modeNeedsTimeline()&&!byId('timelinePath').value){setNotice('请先选择或上传切片标记文件','warning');return}
    rememberWorkspacePaths();taskBusy=true;updateActions();setNotice('正在启动重新切片...');
    const body={flv_path:selectedVideo,output_dir:byId('od').value,mode};
    if(mode==='timeline-json')body.timeline_json=byId('timelinePath').value;else body.timeline_path=byId('timelinePath').value;
    try{await jsonRequest('/api/slice',{method:'POST',body:JSON.stringify(body)});setNotice('切片任务已启动，可在右侧查看进度','success')}catch(error){taskBusy=false;updateActions();setNotice(`切片启动失败：${error.message}`,'error')}
}

async function populateTimelines(url,placeholder,accept){
    try{const result=await jsonRequest(url);const select=byId('timelineSelect');select.replaceChildren(new Option(placeholder,''));(result.files||[]).forEach(file=>select.add(new Option(file.name,file.path)));byId('timelineUpload').accept=accept}catch(error){setNotice(`标记文件列表加载失败：${error.message}`,'error')}
}
function loadDocxTimelines(){return populateTimelines('/api/timelines','选择 DOCX','.docx')}
function loadJsonTimelines(){return populateTimelines('/api/list-json-timelines','选择 JSON','.json')}
function onTimelineSelect(){byId('timelinePath').value=byId('timelineSelect').value;byId('timelineUpload').value='';byId('uploadLabel').textContent=byId('timelineSelect').selectedOptions[0]?.textContent||'或从本机上传';updateActions()}

async function onTimelineUpload(){
    const file=byId('timelineUpload').files[0];if(!file)return;
    byId('uploadLabel').textContent=file.name;
    const form=new FormData();form.append('file',file);
    const mode=byId('mode').value;const url=mode==='timeline-json'?'/api/upload-json-timeline':'/api/upload-timeline';
    try{const response=await fetch(url,{method:'POST',body:form});const result=await response.json();if(!response.ok||result.error)throw new Error(result.error||`上传失败 (${response.status})`);byId('timelinePath').value=result.path;byId('timelineSelect').value='';setNotice(`已载入标记文件：${file.name}`,'success');updateActions();mode==='timeline-json'?loadJsonTimelines():loadDocxTimelines()}catch(error){byId('timelinePath').value='';setNotice(`标记文件上传失败：${error.message}`,'error');updateActions()}
}

restoreWorkspacePaths();connectSSE();toggleTimeline();scan();
</script>
</body>
</html>
