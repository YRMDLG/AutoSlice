<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>弹幕切片 · AutoSlice</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--accent:#e94560;--blue:#0f3460;--text:#e0e0e0;--muted:#888;--green:#2ecc71;--red:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.topbar{background:var(--card);border-bottom:1px solid #222;padding:12px 24px;display:flex;align-items:center;gap:24px}
.topbar .logo{font-size:1.2em;font-weight:700;color:var(--accent)}
.topbar nav{display:flex;gap:4px}
.topbar nav a{color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:6px;font-size:14px;transition:.2s}
.topbar nav a:hover,.topbar nav a.active{color:#fff;background:var(--blue)}
.main{max-width:1000px;margin:0 auto;padding:24px 20px}
.card{background:var(--card);border-radius:12px;padding:24px;margin-bottom:20px;border:1px solid #222}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.row label{min-width:72px;font-weight:600;color:var(--muted);font-size:13px;letter-spacing:.5px}
input[type="text"],select{flex:1;min-width:160px;padding:10px 14px;border:1px solid #333;border-radius:8px;background:#0d0d1a;color:#fff;font-size:14px;transition:border .2s}
input:focus,select:focus{outline:none;border-color:var(--accent)}
input[type="file"]{flex:1;min-width:160px;font-size:13px}
.btn{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-red{background:var(--accent);color:#fff}.btn-red:hover{background:#c73652;transform:translateY(-1px)}
.btn-dark{background:var(--blue);color:#fff}.btn-dark:hover{background:#1a4a80}
.btn-sm{font-size:12px;padding:5px 10px}
.vlist{max-height:300px;overflow-y:auto;border-radius:8px}
.vitem{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #1a1a2e;cursor:pointer;font-size:14px}
.vitem:hover{background:#1a2540}.vitem.sel{background:var(--blue);border-left:3px solid var(--accent)}
.badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600}.b-green{background:#1a4a30;color:var(--green)}.b-blue{background:var(--blue);color:#8af}.b-gray{background:#2a2a3a;color:var(--muted)}
.pbox{border-radius:8px;overflow:hidden}
.pitem{padding:14px 16px;background:#0d0d1a;border-bottom:1px solid #1a1a2e}
.pitem .name{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}
.st{font-size:11px;padding:2px 8px;border-radius:4px}.st-run{background:var(--blue);color:#8af}.st-done{background:#1a4a30;color:var(--green)}.st-err{background:#3a1a1a;color:var(--red)}
.pbar{height:4px;background:#1a1a2e;border-radius:2px;margin:6px 0;overflow:hidden}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}
.done .pfill{background:var(--green)}.error .pfill{background:var(--red)}
.pmsg{font-size:12px;color:var(--muted)}
.flex-btns{display:flex;gap:10px;margin-top:16px}
</style></head><body>
<div class="topbar"><div class="logo">AutoSlice</div><nav><a href="/" class="active">弹幕切片</a><a href="/topic-v2">话题分析+切片</a></nav></div>
<div class="main">
<div class="card">
    <div class="row"><label>录播目录</label><input type="text" id="vd"><button class="btn btn-dark" onclick="scan()">扫描</button></div>
    <div class="row" style="margin-top:-4px"><label></label>
        <button class="btn btn-dark btn-sm" onclick='setDir({{ default_video_dir|tojson }})'>默认录播目录</button>
    </div>
    <div class="row"><label>输出目录</label><input type="text" id="od" value="{{ default_output_dir }}"></div>
    <div class="row"><label>模式</label><select id="mode" onchange="toggleTL()">
        <option value="danmaku">弹幕密度自动切</option>
        <option value="hybrid">混合模式 (时间轴+密度)</option>
        <option value="timeline">时间轴文件切 (docx)</option>
        <option value="timeline-json">时间轴 JSON (AI报告)</option>
    </select></div>
    <div class="row" id="tlr" style="display:none"><label>时间轴</label>
        <select id="tls" onchange="onTLSelect()" style="flex:1;min-width:160px"><option value="">-- 选择 --</option></select>
        <span style="color:var(--muted)">或</span>
        <input type="file" id="tlu" accept=".docx,.json" onchange="onTLUpload()" style="flex:1;min-width:160px">
        <input type="hidden" id="tlp"><input type="hidden" id="tlj">
    </div>
    <div class="vlist" id="vlist"><p style="color:var(--muted);padding:16px">点击扫描加载...</p></div>
    <div class="flex-btns"><button class="btn btn-red" onclick="sliceSel()">切片选中</button><button class="btn btn-red" onclick="sliceAll()">全部切片</button></div>
</div>
<div class="card"><div class="pbox" id="tasks"><p style="color:var(--muted);padding:16px">暂无任务</p></div></div>
</div>
<script>
let sel=null,tasks={},sse=null;document.getElementById('vd').value={{ default_video_dir|tojson }};
function setDir(p){document.getElementById('vd').value=p;scan();}
function toggleTL(){var m=document.getElementById('mode').value;document.getElementById('tlr').style.display=(m==='timeline'||m==='hybrid'||m==='timeline-json')?'flex':'none';if(m==='timeline'||m==='hybrid')loadTL();if(m==='timeline-json')loadJTL();}
function connectSSE(){if(sse)sse.close();sse=new EventSource('/api/events');sse.addEventListener('init',e=>{tasks=JSON.parse(e.data);renderT();});sse.addEventListener('task_update',e=>{var d=JSON.parse(e.data);tasks[d.task_id]=d;renderT();});sse.onerror=()=>setTimeout(connectSSE,3000);}
function renderT(){var ids=Object.keys(tasks),el=document.getElementById('tasks');if(!ids.length){el.innerHTML='<p style=color:var(--muted);padding:16px>暂无任务</p>';return}var o={running:0,pending:1,done:2,error:3};ids.sort((a,b)=>(o[tasks[a].status]||9)-(o[tasks[b].status]||9));el.innerHTML=ids.map(function(id){var t=tasks[id],pct=t.total>0?Math.round(t.step/t.total*100):0,cls=t.status==='done'?'done':t.status==='error'?'error':'',sl=t.status==='running'?'进行中':t.status==='done'?'完成':t.status==='error'?'失败':'等待';return'<div class="pitem '+cls+'"><div class=name><span>'+id+'</span><span class="st st-'+(t.status==='running'?'run':t.status==='done'?'done':'err')+'">'+sl+'</span></div>'+(t.status==='running'?'<div class=pbar><div class=pfill style=width:'+pct+'%></div></div>':'')+'<div class=pmsg>'+(t.progress||'')+' '+(t.result||'')+'</div></div>'}).join('');}
async function scan(){var r=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({video_dir:document.getElementById('vd').value})});var d=await r.json();document.getElementById('vlist').innerHTML=d.videos.map(function(v,i){return'<div class=vitem onclick=pick(this,\''+v.path.replace(/\\/g,'\\\\')+'\')><span>'+v.name+'</span><span class="badge '+(v.has_ass?'b-blue':'b-gray')+'">'+(v.has_ass?'弹幕':'无弹幕')+'</span><span class="badge '+(v.has_srt?'b-green':'b-gray')+'">'+(v.has_srt?'字幕':'无字幕')+'</span></div>'}).join('');}
function pick(el,p){document.querySelectorAll('.vitem').forEach(function(e){e.classList.remove('sel')});el.classList.add('sel');sel=p;}
async function sliceSel(){if(!sel){alert('请先选择视频');return}var m=document.getElementById('mode').value,b={flv_path:sel,output_dir:document.getElementById('od').value,mode:m};if(m==='timeline-json')b.timeline_json=document.getElementById('tlp').value;else b.timeline_path=document.getElementById('tlp').value;await fetch('/api/slice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});}
async function sliceAll(){var m=document.getElementById('mode').value,b={video_dir:document.getElementById('vd').value,output_dir:document.getElementById('od').value,mode:m};if(m==='timeline-json')b.timeline_json=document.getElementById('tlp').value;else b.timeline_path=document.getElementById('tlp').value;await fetch('/api/slice-all',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});}
async function loadTL(){var r=await fetch('/api/timelines');var d=await r.json();document.getElementById('tls').innerHTML='<option value=>-- docx --</option>'+d.files.map(function(f){return'<option value='+f.path+'>'+f.name+'</option>'}).join('');document.getElementById('tlu').accept='.docx';}
async function loadJTL(){var r=await fetch('/api/list-json-timelines');var d=await r.json();document.getElementById('tls').innerHTML='<option value=>-- JSON --</option>'+d.files.map(function(f){return'<option value='+f.path+'>'+f.name+'</option>'}).join('');document.getElementById('tlu').accept='.json';}
function onTLSelect(){document.getElementById('tlp').value=document.getElementById('tls').value;document.getElementById('tlu').value='';}
function onTLUpload(){var file=document.getElementById('tlu').files[0];if(!file)return;var fd=new FormData();fd.append('file',file);var m=document.getElementById('mode').value,url=m==='timeline-json'?'/api/upload-json-timeline':'/api/upload-timeline';fetch(url,{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){if(d.path){document.getElementById('tlp').value=d.path;document.getElementById('tls').value='';m==='timeline-json'?loadJTL():loadTL();}});}
connectSSE();scan();toggleTL();
</script></body></html>
